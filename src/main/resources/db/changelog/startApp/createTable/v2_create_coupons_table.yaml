databaseChangeLog:
  - changeSet:
      id: create-coupons-table
      author: rishat
      changes:
        - createTable:
            tableName: coupons
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: discount_percent
                  type: decimal(5,2)
                  constraints:
                    nullable: false

